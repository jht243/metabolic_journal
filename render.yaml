services:
  - type: web
    name: metabolic-health-web
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: SITE_URL
        value: https://themetabolicjournal.com
      - key: RESEND_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health

  - type: cron
    name: metabolic-health-daily
    runtime: python
    schedule: "0 14 * * *"
    plan: starter
    buildCommand: "rm -rf /opt/render/.cache/pip && pip install --no-cache-dir -r requirements.txt"
    startCommand: "python run_daily.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: SITE_URL
        value: https://themetabolicjournal.com
      - key: LOG_LEVEL
        value: INFO
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: jht243/metabolic_health
