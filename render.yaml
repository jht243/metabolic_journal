# RENDER BLUEPRINT — PLACEHOLDER (old project services removed)
# Replace service names, env vars, and schedules for the NEW project
# before connecting this repo to a new Render workspace.
# =====================================================================
services:
  - type: web
    name: REPLACE-ME-web
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: SITE_URL
        value: https://REPLACE_ME_DOMAIN.com
      - key: RESEND_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health

  - type: cron
    name: REPLACE-ME-daily-pipeline
    runtime: python
    schedule: "0 15,22 * * *"
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python run_daily.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: LOG_LEVEL
        value: INFO

  - type: cron
    name: REPLACE-ME-daily-seo-email
    runtime: python
    schedule: "0 16 * * *"
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python scripts/send_daily_seo_email.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: RESEND_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO

  - type: cron
    name: REPLACE-ME-weekly-linkcheck
    runtime: python
    schedule: "0 8 * * 1"
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python scripts/run_outreach.py check"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: LOG_LEVEL
        value: INFO
